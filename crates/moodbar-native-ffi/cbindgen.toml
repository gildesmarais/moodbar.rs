  "MoodbarNativeStatus",
  "moodbar_native_analysis_from_path",
  "moodbar_native_analysis_from_bytes",
  "moodbar_native_analysis_dispose",
  "moodbar_native_render_svg",
  "moodbar_native_render_png",
  "moodbar_native_buffer_free",
  "moodbar_native_last_error",
]
