name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download published WASM package for demo assets
        run: |
          rm -rf docs/assets/moodbar-wasm
          mkdir -p docs/assets/moodbar-wasm
          npm pack @moodbar/wasm@latest --silent
          TARBALL="$(ls -t moodbar-wasm-*.tgz | head -n1)"
          tar -xzf "$TARBALL" -C docs/assets/moodbar-wasm --strip-components=1 package/
          rm -f "$TARBALL"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
