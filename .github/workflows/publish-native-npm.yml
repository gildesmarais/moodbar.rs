name: publish-native-npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: macos-latest
    env:
      NODE_VERSION: "22.22.0"
      NPM_VERSION: "11.8.0"
      ANDROID_NDK_VERSION: "27.1.12297006"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Export NDK path
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Pin npm
        run: npm install -g npm@${NPM_VERSION}

      - name: Validate release tag matches workspace version
        run: |
          WORKSPACE_VERSION="$(node scripts/workspace-version.mjs Cargo.toml)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$WORKSPACE_VERSION" ]; then
            echo "Could not determine workspace version from Cargo.toml"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match workspace version ${WORKSPACE_VERSION}"
            exit 1
          fi

      - name: Build iOS native artifacts
        run: make native-ios

      - name: Build Android native artifacts
        run: make native-android

      - name: Validate publishable native package
        run: make publish-check-native

      - name: Publish to npm
        run: npm publish ./packages/moodbar-native --access public --provenance
