name: publish-wasm-npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install wasm-pack
        run: cargo install wasm-pack

      # Node 22.14+ / npm 11.5.1+ required for OIDC trusted publishing
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build WASM package
        run: wasm-pack build crates/moodbar-wasm --release --target bundler --out-dir ../../packages/moodbar-wasm --package-name @moodbar/wasm

      # Provenance is generated automatically via trusted publishing — no token needed.
      # Requires this package to be configured as a trusted publisher on npmjs.com first.
      - name: Publish to npm
        run: npm publish packages/moodbar-wasm --access public
