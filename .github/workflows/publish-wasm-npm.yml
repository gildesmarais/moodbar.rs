name: publish-wasm-npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build WASM package
        run: wasm-pack build crates/moodbar-wasm --release --target bundler --out-dir ../../packages/moodbar-wasm --package-name @moodbar/wasm

      - name: Publish to npm
        run: npm publish packages/moodbar-wasm --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
