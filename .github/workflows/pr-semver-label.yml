name: pr-semver-label

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR from Conventional Commit title
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const title = (pr.title || "").trim()

            const semverLabels = ["semver:major", "semver:minor", "semver:patch"]
            for (const label of semverLabels) {
              try {
                await github.rest.issues.removeLabel({
                  ...context.repo,
                  issue_number: pr.number,
                  name: label,
                })
              } catch (_) {
                // ignore if label not present
              }
            }

            let next = "semver:patch"
            const breaking = /(^\w+(\([^)]+\))?!:)|BREAKING CHANGE/i.test(title)
            const feat = /^feat(\([^)]+\))?:/.test(title)

            if (breaking) {
              next = "semver:major"
            } else if (feat) {
              next = "semver:minor"
            }

            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: pr.number,
              labels: [next],
            })
